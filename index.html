<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TGNPDCL - Secure Login</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            margin: 0; 
            padding: 0;
            position: fixed; /* స్క్రీన్‌ని ఒకే చోట కదలకుండా పట్టి ఉంచుతుంది */
            width: 100%;
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            overflow: hidden; /* స్క్రీన్ అస్సలు పైకి కిందకి జరగకుండా లాక్ చేస్తుంది */
        }
        
        /* పైభాగం డిజైన్ */
        .top-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .logo-circle {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .app-title { font-size: 26px; font-weight: 900; margin: 0; letter-spacing: 1px; }
        .app-subtitle { font-size: 13px; opacity: 0.8; margin-top: 5px; letter-spacing: 2px; text-transform: uppercase; }

        /* కింది వైట్ కార్డ్ డిజైన్ */
        .bottom-sheet {
            background: #ffffff;
            border-radius: 35px 35px 0 0;
            padding: 40px 25px;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.15);
        }
        .welcome-text { font-size: 24px; font-weight: 800; color: #0f172a; margin: 0 0 5px 0; }
        .instruction-text { font-size: 14px; color: #64748b; margin-bottom: 25px; }

        /* మోడ్రన్ ఇన్‌పుట్ బాక్సులు */
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group span.icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #94a3b8;
        }
        .input-group input {
            width: 100%;
            padding: 16px 15px 16px 45px;
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            font-size: 15px;
            outline: none;
            background: #f8fafc;
            transition: all 0.3s ease;
            color: #1e293b;
            font-weight: 500;
        }
        .input-group input:focus {
            border-color: #3b82f6;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        .eye-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 18px;
            color: #94a3b8;
            cursor: pointer;
            padding: 0;
        }

        /* లాగిన్ బటన్ */
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            transition: transform 0.1s;
        }
        .login-btn:active { transform: scale(0.97); }

        .forgot-link {
            display: block;
            text-align: right;
            color: #3b82f6;
            font-size: 13px;
            font-weight: bold;
            text-decoration: none;
            margin-top: -5px;
            margin-bottom: 20px;
        }
        
        .footer { text-align: center; font-size: 11px; color: #94a3b8; margin-top: 25px; }
        
        /* ఎర్రర్ మెసేజ్ పాపప్ */
        #errorMsg {
            display: none;
            background: #ef4444;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 15px;
            animation: shake 0.3s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
    </style>
</head>
<body>

    <div class="top-section">
        <div class="logo-circle">⚡</div>
        <h1 class="app-title">TGNPDCL</h1>
        <div class="app-subtitle">Collection Services Dashboard</div>
    </div>

    <div class="bottom-sheet">
        <h2 class="welcome-text">Welcome Back!</h2>
        <p class="instruction-text">Securely login to your field dashboard</p>

        <div id="errorMsg">⚠️ Invalid Employee ID or Password.</div>

        <div class="input-group">
            <span class="icon">👤</span>
            <input type="text" id="username" placeholder="Employee ID / Username" autocomplete="off">
        </div>

        <div class="input-group">
            <span class="icon">🔒</span>
            <input type="password" id="password" placeholder="Enter Password">
            <button class="eye-btn" onclick="togglePassword()" title="Show Password">👁️</button>
        </div>

        <a href="#" class="forgot-link" onclick="alert('Please contact Admin to reset password.')">Forgot Password?</a>

        <button class="login-btn" onclick="checkLogin()">Secure Login</button>

        <div class="footer">
            System V6.0 | Secured & Encrypted
        </div>
    </div>

    <script>
        // పాస్‌వర్డ్ కనబడటానికి / దాచడానికి ఫంక్షన్
        function togglePassword() {
            const pwdInput = document.getElementById("password");
            const eyeBtn = document.querySelector(".eye-btn");
            if (pwdInput.type === "password") {
                pwdInput.type = "text";
                eyeBtn.innerText = "🙈"; // కన్ను మూసిన ఐకాన్
            } else {
                pwdInput.type = "password";
                eyeBtn.innerText = "👁️"; // కన్ను తెరిచిన ఐకాన్
            }
        }

        // లాగిన్ చెక్ చేసే ఫంక్షన్
        function checkLogin() {
            const user = document.getElementById("username").value.trim();
            const pass = document.getElementById("password").value.trim();
            const errorMsg = document.getElementById("errorMsg");

            if (user === "" || pass === "") {
                errorMsg.innerText = "⚠️ Please enter both ID and Password.";
                errorMsg.style.display = "block";
                return;
            }

            // ఇక్కడ మీ అసలైన యూజర్ నేమ్ మరియు పాస్‌వర్డ్ సెట్ చేసుకోండి
            if (user === "admin" && pass === "1234") { 
                localStorage.setItem("auth_token", "secure_login");
                // లాగిన్ అయ్యాక వెళ్లాల్సిన డాష్‌బోర్డ్ ఫైల్ పేరు ఇక్కడ ఇవ్వండి
                window.location.replace("dashboard.html"); 
            } else {
                errorMsg.innerText = "⚠️ Invalid Employee ID or Password.";
                errorMsg.style.display = "block";
                document.getElementById("password").value = ""; // తప్పు కొడితే పాస్వర్డ్ బాక్స్ ఖాళీ అవుతుంది
            }
        }
    </script>
</body>
</html>
