<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TGNPDCL - Login</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            overflow: hidden; /* స్క్రీన్ కదలికలు ఆగిపోతాయి */
        }
        .top-section { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
        .bottom-sheet { 
            background: white; border-radius: 40px 40px 0 0; 
            padding: 30px; box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
            flex-shrink: 0; /* కార్డ్ సైజ్ మారకుండా ఫిక్స్ చేశాను */
        }
        .input-group { margin-bottom: 15px; position: relative; }
        .input-group input { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; }
        .login-btn { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 12px; font-weight: bold; }
        .footer { text-align: center; font-size: 12px; color: #888; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="top-section">
        <div style="font-size: 50px;">⚡</div>
        <h1 style="margin: 5px;">TGNPDCL</h1>
        <p>Collection Services</p>
    </div>

    <div class="bottom-sheet">
    <h2 class="welcome-text">Welcome Back!</h2>
    <p class="instruction-text">Securely login to your field dashboard</p>
    
    <div id="errorMsg" style="color:red; display:none; text-align:center; margin-bottom:10px;"></div>
    
    <div class="input-group">
        <input type="text" id="username" placeholder="Employee ID">
    </div>
    
    <div class="input-group" style="position: relative;">
        <input type="password" id="password" placeholder="Password">
        <button type="button" onclick="togglePassword()" style="position:absolute; right:10px; top:10px; border:none; background:none; cursor:pointer;">👁️</button>
    </div>
    
    <button class="login-btn" id="loginBtn" onclick="performLogin()">Login</button>
    
    <div class="footer">System V4.1 | Secured & Encrypted</div>
</div>

<script>
    function togglePassword() {
        const pwd = document.getElementById("password");
        pwd.type = (pwd.type === "password") ? "text" : "password";
    }
    // ... మీ performLogin ఫంక్షన్ ఇక్కడ కొనసాగుతుంది ...
</script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script>
        async function performLogin() {
            const uname = document.getElementById("username").value.trim();
            const pass = document.getElementById("password").value.trim();
            const errorBox = document.getElementById("errorMsg");
            const btn = document.getElementById("loginBtn");

            if(!uname || !pass) { errorBox.innerText="Enter ID & Pass"; errorBox.style.display="block"; return; }
            btn.disabled = true; btn.innerText = "Checking...";

            try {
                const { data, error } = await supabaseClient.from("users").select("*").eq("username", uname).eq("password", pass);
                if (error) throw error;
                if (data && data.length > 0) {
                    localStorage.setItem("auth_token", "secure_login");
                    window.location.replace("user.html");
                } else {
                    throw new Error("Invalid Credentials");
                }
            } catch (err) {
                errorBox.innerText = "❌ Login Failed!"; errorBox.style.display="block";
                btn.disabled = false; btn.innerText = "Login";
            }
        }
    </script>
</body>
</html>
