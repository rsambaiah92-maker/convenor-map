<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Section Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="js/config.js"></script>

<style>

body{
font-family:Arial,sans-serif;
padding:20px;
background:#f5f5f5;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px #ddd;
max-width:600px;
margin:auto;
}

h2{
text-align:center;
}

input[type=file]{
width:100%;
padding:10px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
cursor:pointer;
}

#status{
margin-top:15px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<h2>SECTION DASHBOARD</h2>

<input type="file" id="excelFile" accept=".xlsx,.xls">

<button onclick="uploadExcel()">
UPLOAD EXCEL
</button>

<div id="status"></div>

<div style="width:100%;background:#ddd;border-radius:10px;margin-top:10px;">
  <div id="progressBar"
       style="
         width:0%;
         height:25px;
         background:#4CAF50;
         border-radius:10px;
         text-align:center;
         color:white;
         line-height:25px;
         font-weight:bold;
       ">
    0%
  </div>
</div>

</div>

<script>

// --- సురక్షితమైన Excel Date Conversion ఫంక్షన్ ---
function excelDateToJSDate(serial) {
  if (!serial) return "";
  
  try {
    if (typeof serial === "string") return serial;

    const utc_days = Math.floor(Number(serial) - 25569);
    const utc_value = utc_days * 86400;
    const date = new Date(utc_value * 1000);

    if (isNaN(date.getTime())) return ""; 

    return date.toISOString().split("T")[0];
  } catch(e) {
    return String(serial);
  }
}

// UI అప్‌డేట్ అవ్వడానికి చిన్న గ్యాప్ ఇచ్చే ఫంక్షన్
const delay = ms => new Promise(resolve => setTimeout(resolve, ms));

async function uploadExcel(){

  try {
    const file = document.getElementById("excelFile").files[0];

    if(!file){
      alert("Select Excel File");
      return;
    }

    document.getElementById("progressBar").style.width = "0%";
    document.getElementById("progressBar").innerHTML = "0%";

    document.getElementById("status").innerHTML = "Reading Excel File...";
    await delay(50); 

    const data = await file.arrayBuffer();

    document.getElementById("status").innerHTML = "Opening Workbook...";
    await delay(50); 

    const workbook = XLSX.read(data,{type:"array"});

    document.getElementById("status").innerHTML = "Reading Sheet...";
    await delay(50); 

    const sheet = workbook.Sheets[workbook.SheetNames[0]];

    document.getElementById("status").innerHTML = "Converting To JSON...";
    await delay(50); 

    const rows = XLSX.utils.sheet_to_json(sheet);

    document.getElementById("status").innerHTML = "Rows Found : " + rows.length;
    await delay(1000);

    document.getElementById("status").innerHTML = "Creating Records...";
    await delay(50);

    const records = rows.map(row => ({
      section: row["SECTION"] || "",
      area: row["AREA"] || "",
      scno: row["SCNO"] || "",
      uan_no: row["UAN NO"] || "",
      name: row["NAME"] || "",
      address: row["ADDRESS"] || "",
      cat: row["CAT"] || "",
      subcat: row["SUBCAT"] || "",
      pole_no: row["POLE NO"] || "",
      
      due_date: excelDateToJSDate(row["DUE DATE"]),
      
      current_demand: Number(row["CURRENT DEMAND AMT"] ?? row["CURRENT DEMAND"] ?? 0),
      arrears: Number(row["ARREARS AMT"] ?? row["ARREARS"] ?? 0),
      total_amt: Number(row["TOTAL AMT"] || 0),
      
      mobile_no: row["MOBILE NO"] || "",
      latitude: parseFloat(String(row["LATITUDE"] || "").replace("N","")),
      longitude: parseFloat(String(row["LONGITUDE"] || "").replace("E","")),
      load: row["LOAD"] || "",
      rmd: row["RMD"] || "",
      
      billing_cycle: row["BILLING CYCLE"] || "",
      status: row["STATUS"] || "",
      acd_due_amt: Number(row["ACD DUE AMT"] || 0),
      
      last_paid_date: excelDateToJSDate(row["LAST PAID DATE"]),
      
      structure_code: row["STRUCUTRE CODE"] || "",
      digital_structure_code: row["DIGITAL STRUCUTRE CODE"] || "",
      machine_id: row["MACHINE ID"] || "",

      uploaded_by: "section"
    }));

    document.getElementById("status").innerHTML = "Deleting Old Records...";
    await delay(50); 

    // --- మీరు చెప్పిన సేఫ్ డిలీట్ కోడ్ ---
    if (records.length > 0) {
      const currentSection = records[0].section;
      
      const { error: deleteError } = await supabaseClient
      .from("records")
      .delete()
      .eq("section", currentSection); // కేవలం ఈ సెక్షన్ డేటా మాత్రమే డిలీట్ అవుతుంది!

      if(deleteError){
       document.getElementById("status").innerHTML = "<span style='color:red;'>Delete Error : " + deleteError.message + "</span>";
       return;
      }
    } else {
      document.getElementById("status").innerHTML = "<span style='color:red;'>Error: No valid records found in Excel.</span>";
      return;
    }

    document.getElementById("status").innerHTML = "Old Records Deleted";
    await delay(500); 

    document.getElementById("status").innerHTML = "Starting Upload...";
    await delay(50); 

    const batchSize = 200;

    for(let i = 0; i < records.length; i += batchSize){

      const batch = records.slice(i, i + batchSize);
      const percent = Math.round(((i + batch.length) / records.length) * 100);

      document.getElementById("status").innerHTML = `Uploading ${Math.min(i + batch.length, records.length)} / ${records.length}`;
      document.getElementById("progressBar").style.width = percent + "%";
      document.getElementById("progressBar").innerHTML = percent + "%";

      const { error } = await supabaseClient
        .from("records")
        .insert(batch);

      if(error){
        document.getElementById("status").innerHTML = "<span style='color:red;'>Upload Error : " + error.message + "</span>";
        return;
      }

      await new Promise(resolve => setTimeout(resolve, 50));
    }

    document.getElementById("status").innerHTML = "Upload Success : " + records.length + " Records";
    document.getElementById("progressBar").style.width = "100%";
    document.getElementById("progressBar").innerHTML = "100%";

    alert(records.length + " Records Ready and Uploaded successfully!");

  } catch (error) {
    console.error(error);
    document.getElementById("status").innerHTML = "<span style='color:red;'>Code Error : " + error.message + "</span>";
  }
}

</script>

</body>
</html>
