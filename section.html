<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Section Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="js/config.js"></script>

<style>

body{
font-family:Arial,sans-serif;
padding:20px;
background:#f5f5f5;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px #ddd;
max-width:600px;
margin:auto;
}

h2{
text-align:center;
}

input[type=file]{
width:100%;
padding:10px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
cursor:pointer;
}

#status{
margin-top:15px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="card">

<h2>SECTION DASHBOARD</h2>

<input type="file" id="excelFile" accept=".xlsx,.xls">

<button onclick="uploadExcel()">
UPLOAD EXCEL
</button>

<div id="status"></div>

</div>

<script>

async function uploadExcel(){

const file =
document.getElementById("excelFile").files[0];

if(!file){

alert("Select Excel File");

return;
}

document.getElementById("status").innerHTML =
"Reading Excel File...";

const data =
await file.arrayBuffer();

const workbook =
XLSX.read(data);

const sheet =
workbook.Sheets[
workbook.SheetNames[0]
];

const rows =
XLSX.utils.sheet_to_json(sheet);

document.getElementById("status").innerHTML =
"Rows Found : " + rows.length;

/* NEXT STEP:
Excel → Supabase Insert
*/

console.log(rows);

alert(
rows.length +
" Records Ready"
);

}

</script>

</body>
</html>
