<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TGNPDCL User Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"/>
<style>
body{font-family:Arial,sans-serif;padding:10px}
input,select,button{width:100%;padding:12px;margin-top:8px;box-sizing:border-box}
.card{border:1px solid #ddd;padding:10px;margin-bottom:10px}
table{width:100%;border-collapse:collapse;display:block;overflow:auto}
th,td{border:1px solid #ccc;padding:8px}
#map{height:300px;border:1px solid #ccc;margin-top:10px}
.amount-inputs {display: flex; gap: 10px;}

.map-wrapper{
  position:relative;
}
#myLocationBtn{
  position:absolute;
  top:10px;
  right:10px;
  z-index:1000;
  width:auto;
  padding:8px 12px;
  border:none;
  border-radius:6px;
  background:#fff;
  cursor:pointer;
}

/* Tooltip CSS */
.scno-label{
  background:white;
  border:1px solid #333;
  border-radius:4px;
  padding:2px 4px;
  font-size:10px;
  font-weight:bold;
  color:#000;
}
</style>
</head>
<body>

<h2>TGNPDCL USER DASHBOARD</h2>

<div class="card">
Selected Services:
<span id="totalRecords">0</span>
<br><br>
Total Amount :
₹<span id="totalAmount">0</span>
</div>

<input type="text" id="searchBox" placeholder="Search">

<select id="areaFilter">
<option value="">ALL AREAS</option>
</select>

<select id="catFilter" multiple size="5">
<option value="1">Category 1</option>
<option value="2">Category 2</option>
<option value="3">Category 3</option>
<option value="4">Category 4</option>
<option value="5">Category 5</option>
<option value="6">Category 6</option>
<option value="7">Category 7</option>
<option value="8">Category 8</option>
<option value="9">Category 9</option>
</select>

<select id="poleFilter">
<option value="">ALL POLES</option>
</select>

<div class="amount-inputs">
  <input type="number" id="minAmount" placeholder="Min Amount" value="0">
  <input type="number" id="maxAmount" placeholder="Max Amount" value="1000000">
</div>

<button onclick="loadData()">Apply Filters</button>

<div class="map-wrapper">
  <button id="myLocationBtn" onclick="showMyLocation()">📍 My Location</button>
  <div id="map"></div>
</div>

<table>
<thead>
<tr>
<th>SCNO</th>
<th>NAME</th>
<th>MOBILE</th>
<th>TOTAL</th>
<th>MAP</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>

<script>
let masterData=[];

async function loadData(){

 const area=document.getElementById("areaFilter").value;
 
 if(!area){
   alert("Please Select Area");
   return;
 }

 let query = supabaseClient
   .from("records")
   .select("*");

 if(area){
   query = query.eq("area", area);
 }

 const pole=document.getElementById("poleFilter").value;
 
 const selectedCats =
 [...document.getElementById("catFilter").options]
 .filter(opt => opt.selected)
 .map(opt => opt.value);

 if(pole){
   query = query.ilike("pole_no", pole + "%");
 }
 
 if(selectedCats.length > 0){
   query = query.in("cat", selectedCats);
 }

 const { data, error } = await query;

 if(error){
   alert(error.message);
   return;
 }

 let filtered = data || [];
 masterData = filtered; // మ్యాప్ కోసం డేటాను పాస్ చేయడానికి

 const minAmt = Number(document.getElementById("minAmount").value||0);
 const maxAmt = Number(document.getElementById("maxAmount").value||99999999);
 const search=document.getElementById("searchBox").value.toLowerCase();

 filtered = filtered.filter(r=>{
  const amt = Number(r.total_amt||0);
  return amt >= minAmt && amt <= maxAmt;
 });

 if(search){
  filtered=filtered.filter(r=>
  JSON.stringify(r).toLowerCase().includes(search)
  );
 }

 document.getElementById("totalRecords").innerText=filtered.length;

 let total=0;
 filtered.forEach(r=>{
  total += Number(r.total_amt||0);
 });

 document.getElementById("totalAmount").innerText = total;

 let html='';
 filtered.forEach(r=>{
  html+=`<tr>
  <td>${r.scno||''}</td>
  <td>${r.name||''}</td>
  <td>${r.mobile_no||''}</td>
  <td>${r.total_amt||0}</td>
  <td><a target="_blank" href="https://maps.google.com/?q=${r.latitude},${r.longitude}">MAP</a></td>
  </tr>`;
 });

 document.getElementById("tableBody").innerHTML=html;
}
</script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<script>
let map=L.map('map').setView([17.95,80.82],11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
let markers=[];
let routingControl = null;

function clearMarkers(){
 markers.forEach(m=>map.removeLayer(m));
 markers=[];
}

function cleanCoord(v){
 if(!v) return null;
 return parseFloat(String(v).replace(/[NSEW]/gi,''));
}

const oldLoadData = loadData;
loadData = async function(){
 await oldLoadData();

 if(typeof masterData==="undefined") return;

 clearMarkers();

 const area=document.getElementById("areaFilter").value;
 
 if(!area){
   return; // డబుల్ అలర్ట్ రాకుండా ఇక్కడ కేవలం రిటర్న్ చేయబడింది
 }
 
 const pole=document.getElementById("poleFilter").value;
 const minAmt = Number(document.getElementById("minAmount").value||0);
 const maxAmt = Number(document.getElementById("maxAmount").value||99999999);
 const search=document.getElementById("searchBox").value.toLowerCase();

 let filtered=[...masterData];

 // Area & Pole & Category filters డేటాబేస్ లోనే జరిగిపోతాయి కాబట్టి మళ్ళీ ఇక్కడ అవసరం లేదు

 filtered = filtered.filter(r=>{
  const amt = Number(r.total_amt||0);
  return amt >= minAmt && amt <= maxAmt;
 });

 if(search){
  filtered=filtered.filter(r=>JSON.stringify(r).toLowerCase().includes(search));
 }

 filtered.forEach(r=>{
  const lat=cleanCoord(r.latitude);
  const lng=cleanCoord(r.longitude);
  if(lat && lng){
   
   let pinColor = "blue";
   const arrears = Number(r.arrears || 0);

   if (arrears === 0) {
     pinColor = "green";
   } else if (arrears <= 5000) {
     pinColor = "orange";
   } else {
     pinColor = "red";
   }

   const icon = L.icon({
     iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${pinColor}.png`,
     shadowUrl: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png",
     iconSize: [25, 41],
     iconAnchor: [12, 41],
     popupAnchor: [1, -34]
   });

   const m = L.marker([lat,lng], {icon}).addTo(map);
   
   const t = L.tooltip({
     permanent: true,
     direction: "top",
     offset: [0, -10],
     className: "scno-label"
   })
   .setContent(String(r.scno || "").slice(-5))
   .setLatLng([lat,lng])
   .addTo(map);
   
   m.bindPopup(
   "<b>"+(r.name||"")+"</b><br>"+
   "SCNO: "+(r.scno||"")+"<br>"+
   "Mobile: "+(r.mobile_no||"")+"<br>"+
   "Current Demand: "+(r.current_demand||0)+"<br>"+
   "Arrears: "+(r.arrears||0)+"<br>"+
   "Amount: "+(r.total_amt||0)+"<br><br>"+
   "<a href='tel:"+(r.mobile_no||"")+"'>📞 Call</a><br><br>"+
   "<a target='_blank' href='https://wa.me/91"+(r.mobile_no||"")+"'>🟢 WhatsApp</a><br><br>"+
   "<a target='_blank' href='https://maps.google.com/?q="+lat+","+lng+"'>📍 Navigate</a><br><br>"+
   "<button onclick='showRoute("+lat+","+lng+")'>🛣 Route</button>"
   );
   
   markers.push(m);
   markers.push(t);
  }
 });
}

document.getElementById("areaFilter").onchange=()=>{
 clearMarkers();
 document.getElementById("tableBody").innerHTML="";
 document.getElementById("totalRecords").innerText="0";
 document.getElementById("totalAmount").innerText="0";
 document.getElementById("poleFilter").selectedIndex=0;

 [...document.getElementById("catFilter").options]
 .forEach(opt => opt.selected = false);
};

document.getElementById("poleFilter").onchange=()=>{
 clearMarkers();
 document.getElementById("tableBody").innerHTML="";
};

document.getElementById("searchBox").oninput=()=>{};
document.getElementById("minAmount").oninput=()=>{};
document.getElementById("maxAmount").oninput=()=>{};

function showMyLocation(){
  if(!navigator.geolocation){
    alert("Location not supported");
    return;
  }

  navigator.geolocation.getCurrentPosition(pos=>{
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    map.setView([lat,lng],16);

    L.marker([lat,lng])
      .addTo(map)
      .bindPopup("📍 My Location")
      .openPopup();

  },()=>{
    alert("Location permission denied");
  });
}

function showRoute(lat,lng){
  if(!navigator.geolocation){
    alert("Location not supported");
    return;
  }

  navigator.geolocation.getCurrentPosition(pos=>{

    const myLat = pos.coords.latitude;
    const myLng = pos.coords.longitude;

    if(routingControl){
      map.removeControl(routingControl);
    }

    routingControl = L.Routing.control({
      waypoints:[
        L.latLng(myLat,myLng),
        L.latLng(lat,lng)
      ],
      routeWhileDragging:false,
      show:false
    }).addTo(map);

  });
}

window.onload = async () => {

 const { data, error } = await supabaseClient
 .from("records")
 .select("area,pole_no")
 .range(0,12000);

 if(error){
   alert(error.message);
   return;
 }

 const areas = [...new Set(
 data.map(r => r.area).filter(Boolean)
 )];

 const area =
 document.getElementById("areaFilter");

 areas.forEach(a=>{
   area.innerHTML +=
   `<option value="${a}">${a}</option>`;
 });

 const poles = [...new Set(
 data.map(r=>{
   const pole =
   String(r.pole_no||"");

   const match =
   pole.match(/^[A-Za-z]+/);

   return match ?
   match[0].toUpperCase() : null;

 }).filter(Boolean)
 )];

 const pole =
 document.getElementById("poleFilter");

 poles.forEach(p=>{
   pole.innerHTML +=
   `<option value="${p}">${p}</option>`;
 });

};
</script>

</body>
</html>
