<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
input, button{
    width:100%;
    padding:12px;
    font-size:16px;
}

table{
    width:100%;
    display:block;
    overflow-x:auto;
}
</style>
</head>

<h2>USER DASHBOARD</h2>

<div>
Total Records :
<span id="totalRecords">0</span>

<br><br>

Total Amount :
<span id="totalAmount">0</span>
</div>

<br>

<input type="text" id="searchBox"
placeholder="Search SCNO / UAN / Name / Mobile">
<br><br>

<select id="areaFilter" onchange="loadData()">
<option value="">ALL AREAS</option>
</select>

<br><br>

<select id="poleFilter">
<option value="">ALL POLES</option>
</select>

<br><br>
<button onclick="searchData()">Search</button>



<br><br>

<table border="1" width="100%">
<thead>
<tr>
<th>SCNO</th>
<th>NAME</th>
<th>MOBILE</th>
<th>TOTAL</th>
<th>MAP</th>
</tr>
</thead>

<tbody id="tableBody">
</tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>

<script>

async function loadData(){

const { data, error } =
await supabaseClient
.from("records")
.select("*");

if(error){
alert(error.message);
return;
}

document.getElementById("totalRecords").innerText =
data.length;

let total = 0;

data.forEach(r=>{
total += Number(r.total_amt || 0);
});

document.getElementById("totalAmount").innerText =
total;
    
const areaFilter =
document.getElementById("areaFilter");

const areas =
[...new Set(data.map(r => r.area))];

areaFilter.innerHTML =
'<option value="">ALL AREAS</option>';

areas.forEach(a => {

areaFilter.innerHTML +=
`<option value="${a}">${a}</option>`;

});
const selectedArea =
areaFilter.value;
    
const poleFilter =
document.getElementById("poleFilter");

const poles =
[...new Set(
data.map(r =>
r.pole_no.split("-")[0]
)
)];

poleFilter.innerHTML =
'<option value="">ALL POLES</option>';

poles.forEach(p => {

poleFilter.innerHTML +=
`<option value="${p}">${p}</option>`;

});

const selectedPole =
poleFilter.value;
    
let filteredData = data;
if(selectedPole){

filteredData =
filteredData.filter(r =>
r.pole_no === selectedPole
);

}
if(selectedArea){

filteredData =
filteredData.filter(r =>
r.area === selectedArea
);

}
let html = "";

filteredData.forEach(r=>{

html += `
<tr>
<td>${r.scno}</td>
<td>${r.name}</td>
<td>${r.mobile_no}</td>
<td>${r.total_amt}</td>
<td>
<a target="_blank"
href="https://maps.google.com/?q=${r.latitude},${r.longitude}">
MAP
</a>
</td>
</tr>
`;

});

document.getElementById("tableBody").innerHTML =
html;

}
function searchData() {

const search =
document.getElementById("searchBox").value.toLowerCase();

const rows =
document.querySelectorAll("#tableBody tr");

rows.forEach(row => {

if (row.innerText.toLowerCase().includes(search)) {
row.style.display = "";
} else {
row.style.display = "none";
}

});

}
loadData();

</script>

</body>
</html>
